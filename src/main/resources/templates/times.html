<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Meus Times</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="times.css">
</head>
<body>
    <!-- Menu Lateral Compartilhado -->
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <ul>
            <li><a href="/pokedex">Pokédex</a></li>
            <li><a href="/times">Meus Times</a></li>
            <li id="menuAdmin" style="display:none;"><a href="/admin">Controle de Usuários</a></li>
            <li><a href="/logout">Sair</a></li>
        </ul>
    </div>

    <div class="pokedex-wrapper">
        
        <!-- Left Panel: Create / Edit / View -->
        <div class="pokedex-left-panel" id="infoPanel">
            <!-- Pokedex Header (Lights) -->
            <div class="pokedex-header">
                <div class="main-light pulse-light" onclick="toggleMenu()" title="Menu">
                    <div class="main-light-reflection"></div>
                </div>
                <div class="small-lights">
                    <div class="small-light red"></div>
                    <div class="small-light yellow"></div>
                    <div class="small-light green"></div>
                </div>
                <button class="mobile-back-btn retro-text-sm" style="margin-left:auto;" onclick="scrollToList()">TIMES ▼</button>
            </div>
            
            <div class="pokedex-screen-border">
                <div class="pokedex-screen-header">
                    <div class="screen-dot"></div><div class="screen-dot"></div>
                </div>
                
                <div class="pokedex-screen" style="padding: 15px; overflow-y: auto;">
                    <h1 class="retro-text text-uppercase mb-2 text-center" style="font-size: 1.0rem; color: #fff; text-shadow: 2px 2px 0 #000;" id="panelTitle">Novo Time</h1>
                    
                    <div class="pokemon-info-display retro-text-sm" id="editorContainer" style="display:flex; flex-direction:column; gap:10px;">
                        
                        <div style="background: rgba(255,255,255,0.4); padding: 8px; border-radius:4px; border:2px solid #222;">
                            <label style="font-size: 0.6rem; margin-bottom: 5px; display:block; font-weight:bold;">NOME DO TIME:</label>
                            <input type="text" id="teamName" class="retro-input" style="width: 100%; margin-bottom: 10px;" placeholder="Digite o nome...">
                            
                            <label style="font-size: 0.6rem; margin-bottom: 5px; display:block; font-weight:bold;">SPRITE TREINADOR:</label>
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom: 10px; position:relative;">
                                <div style="flex:1; position:relative;">
                                    <input type="text" id="trainerNameInput" class="retro-input" style="width: 100%;" placeholder="Ex: red, cynthia..." autocomplete="off">
                                    <div id="trainerAutocompleteList" class="autocomplete-items"></div>
                                </div>
                                <img id="trainerPreview" src="https://play.pokemonshowdown.com/sprites/trainers/unknown.png" style="width:40px; height:40px; object-fit:contain; border:2px solid #222; background:rgba(255,255,255,0.8); border-radius:4px;">
                            </div>
                            
                            <label style="font-size: 0.6rem; margin-bottom: 5px; display:block; font-weight:bold;">JOGO:</label>
                            <select id="gameSelect" class="retro-input" style="width: 100%; height: 30px;">
                                <option value="">Nenhum</option>
                                <option value="red">Red</option>
                                <option value="blue">Blue</option>
                                <option value="yellow">Yellow</option>
                                <option value="gold">Gold</option>
                                <option value="silver">Silver</option>
                                <option value="crystal">Crystal</option>
                                <option value="ruby">Ruby</option>
                                <option value="sapphire">Sapphire</option>
                                <option value="emerald">Emerald</option>
                                <option value="firered">FireRed</option>
                                <option value="leafgreen">LeafGreen</option>
                                <option value="diamond">Diamond</option>
                                <option value="pearl">Pearl</option>
                                <option value="platinum">Platinum</option>
                                <option value="heartgold">HeartGold</option>
                                <option value="soulsilver">SoulSilver</option>
                                <option value="black">Black</option>
                                <option value="white">White</option>
                                <option value="black2">Black 2</option>
                                <option value="white2">White 2</option>
                                <option value="x">X</option>
                                <option value="y">Y</option>
                                <option value="omegaruby">Omega Ruby</option>
                                <option value="alphasapphire">Alpha Sapphire</option>
                                <option value="sun">Sun</option>
                                <option value="moon">Moon</option>
                                <option value="ultrasun">Ultra Sun</option>
                                <option value="ultramoon">Ultra Moon</option>
                                <option value="sword">Sword</option>
                                <option value="shield">Shield</option>
                                <option value="brilliantdiamond">Brilliant Diamond</option>
                                <option value="shiningpearl">Shining Pearl</option>
                                <option value="legendsarceus">Legends Arceus</option>
                                <option value="scarlet">Scarlet</option>
                                <option value="violet">Violet</option>
                            </select>
                        </div>
                        
                        <div id="teamMembers" class="team-grid">
                            <!-- JS vai gerar 6 slots aqui -->
                        </div>

                        <div style="margin-top: 15px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;" id="editorButtons">
                            <button class="btn-pokedex" onclick="salvarTimeAtual()">SALVAR</button>
                            <button class="btn-pokedex" onclick="novoTime()">LIMPAR / NOVO</button>
                        </div>
                        
                        <div style="margin-top: 15px; display: none; gap: 5px; justify-content: center; flex-wrap: wrap;" id="viewButtons">
                            <button class="btn-pokedex" onclick="novoTime()">DESELECIONAR</button>
                            <button class="btn-pokedex" onclick="iniciarEdicao()">EDITAR</button>
                            <button class="btn-pokedex" onclick="excluirTime()">EXCLUIR</button>
                            <button class="btn-pokedex" onclick="hallOfFame()">🏆</button>
                        </div>
                    </div>
                </div>
                
                <div class="pokedex-screen-footer">
                    <div class="screen-dot-large"></div>
                    <div class="speaker-lines">
                        <div class="speaker-line"></div>
                        <div class="speaker-line"></div>
                        <div class="speaker-line"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Central Hinge -->
        <div class="pokedex-hinge">
            <div class="hinge-line"></div>
            <div class="hinge-line"></div>
            <div class="hinge-line"></div>
        </div>

        <!-- Right Panel: List of Teams -->
        <div class="pokedex-right-panel" id="listPanel">
            <div class="right-screen-border">
                <div class="right-screen" style="overflow-y: auto;">
                    
                    <div class="retro-text text-center" style="font-size: 0.8rem; border-bottom: 2px solid #222; padding-bottom: 10px; margin-bottom: 10px;">MEUS TIMES</div>
                    
                    <input type="text" id="teamSearchInput" class="retro-input" placeholder="Pesquisar time..." style="width: 100%; margin-bottom: 15px;" onkeyup="renderizarTimesList()">
                    
                    <div id="teamsListContainer" style="display: flex; flex-direction: column; gap: 15px;">
                        <!-- JS vai listar os times aqui -->
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal for selection -->
    <div id="searchModal" class="modal-overlay" style="display:none;">
        <div class="modal-content retro-text-sm">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight:bold;">
                <span>SELECIONAR POKÉMON</span>
                <span style="cursor:pointer; color:red;" onclick="fecharModal()">X</span>
            </div>
            <input type="text" id="modalSearch" placeholder="Pesquisar..." class="retro-input" onkeyup="filtrarModal()" style="width: 100%; margin-bottom:10px;">
            <ul id="modalList" class="pokemon-list-modal"></ul>
        </div>
    </div>

    <!-- Hall of Fame Modal -->
    <div id="hofOverlay" class="modal-overlay" style="display:none; justify-content:center; align-items:center;" onclick="fecharHof(event)">
        <div id="hofCardWrapper" style="position:relative; width: 600px; max-width: 95%; background: #222; border: 4px solid #fff; border-radius: 8px; overflow:hidden;" onclick="event.stopPropagation()">
            <!-- Top Right Buttons -->
            <div style="position: absolute; top: 10px; right: 10px; z-index: 10; display:flex; gap:5px;">
                <select id="bgThemeSelect" class="btn-pokedex" onchange="changeBgTheme(this.value)" style="outline: none;">
                    <option value="default">Azul (Padrão)</option>
                    <option value="green">Verde</option>
                    <option value="red">Vermelho/Rosa</option>
                    <option value="purple">Roxo</option>
                    <option value="yellow">Laranja/Amarelo</option>
                    <option value="cyan">Ciano</option>
                    <option value="black">Preto</option>
                    <option value="white">Branco</option>
                </select>
                <button class="btn-pokedex" onclick="exportHof()">EXPORTAR LINK</button>
                <button class="btn-pokedex" style="background:#a00;" onclick="fecharHof()">X</button>
            </div>
            
            <div id="hofCard" style="position:relative; width:100%; aspect-ratio: 16/9; overflow:hidden; display: flex; flex-direction: column;">
                <!-- Fundo com as listras -->
                <div id="hofBgFilter" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 1; display:flex; flex-direction:column;">
                    <div style="flex: 1.5; background-color: #9fb8df;"></div>
                    <div style="flex: 6.5; background-color: #cadcf9; display: flex; align-items: flex-end; padding: 2% 5% 5% 5%; box-sizing: border-box;">
                        
                        <div id="hofTeamGrid" style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; z-index: 2; pointer-events:auto; align-items: end;">
                            <!-- Pokemons generated here -->
                        </div>
                        
                        <div id="hofTrainerWrapper" style="width: 30%; display:flex; flex-direction:column; align-items:center; justify-content: flex-end; z-index: 2; pointer-events:auto; padding-bottom: 2px;">
                            <div id="hofGameLogoText" style="font-family:'Press Start 2P', cursive; font-size:1rem; color:white; text-shadow: 2px 2px 0 #000; margin-bottom: 10px; display: none; cursor:pointer; text-align:center;" onclick="toggleGameLogo()" title="Clique para esconder/mostrar logo"></div>
                            <img id="hofGameLogo" referrerpolicy="no-referrer" style="max-width: 140px; max-height: 50px; object-fit: contain; margin-bottom: 5px; display: none; cursor:pointer;" onclick="toggleGameLogo()" title="Clique para esconder/mostrar logo">
                            <img id="hofTrainerImg" referrerpolicy="no-referrer" src="images/trainer_default.png" style="height: 160px; cursor:pointer; object-fit: contain;" onclick="toggleTrainerImg()" title="Clique para esconder/mostrar imagem">
                            <div id="hofTrainerName" style="font-family:'Press Start 2P', cursive; font-size:0.6rem; color:white; text-shadow: 1px 1px 0 #000; margin-top:5px; cursor:pointer;" onclick="toggleTrainerName()" title="Clique para ocultar/mostrar o nome">Treinador</div>
                        </div>

                    </div>
                    <div style="flex: 2; background-color: #586988; display:flex; align-items:center; justify-content:center;">
                        <div style="font-family:'Press Start 2P', cursive; color:#fff; font-size:1.2rem;">HALL DA FAMA</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="times.js"></script>
</body>
</html>
