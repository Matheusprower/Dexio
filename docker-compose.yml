version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dexio-db
    command: -p 5433
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dexio
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: dexio-app
    ports:
      - "80:3000"
    environment:
      SERVER_PORT: 3000
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5433/dexio
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
